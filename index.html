<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance Portal</title>

    <link rel="stylesheet" href="styles/roster2.css">

    <!-- Google scripts removed, handled in cover.html -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script type="module" crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script type="module" crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
</head>

<body>

    <div class="navbar">
        <div class="navbar-brand">
            <h1>出席統計</h1>
        </div>
        <div class="navbar-links">
            <p>
                2026年 <span id="academicYear"></span>
            </p>
        </div>
    </div>

    <div class="container">

        <!-- Google / Data Controls -->
        <div>
            <label id="googleNote">
                已從 Google 載入資料<br>
                如需更新請點「儲存Google」
            </label>

            <button id="update_button" onclick="overwriteFile()">儲存Google</button>
            <button id="logout_button" onclick="logoutDrive()">登出Google</button>

            <button id="clean" onclick="cleanSelectedClass()">刪除出席記錄</button>
        </div>

        <!-- Main Form Section -->
        <div id="formSection">

            <div id="formTitle">
                <h4>1 開始</h4>
                <button class="refresh" onclick="location.reload()">刷新頁面</button>
                <button id="addClassButton" onclick="showAddClassForm()">📅 加入堂次</button>

                <h4>2 名單</h4>
                <button id="addStudentButton" onclick="showAddStudentForm()">👤 加入新朋友</button>

                <h4>3 統計</h4>
                <button id="submitAtt1" oonclick="submitAttendance(); histRate()">
                    📊 送出統計</button>

                <label for="classSelector">日期和堂次記錄:</label>
                <select id="classSelector" required onchange="showStudentsList()"></select>

                <form id="searchForm" onsubmit="searchAndHighlight(); return false;">
                    <input type="text" id="searchTermInput" placeholder="輸入姓名或編號">
                    <button type="submit">搜尋</button>
                </form>

                <a href="#googleNote" class="skip-link">快捷上↑⬆️</a>
                <a href="#resultSection" class="skip-link">快捷下↓⬇️</a>
            </div>

            <!-- Students List -->
            <ul id="studentsList"></ul>

            <!-- Summary Section -->
            <div id="summarySection">
                <h3>出席總計</h3>
                <p>全部人數: <span id="totalStudents">0</span></p>
                <p>第1堂出席人數: <span id="totalPresent1">0</span></p>
                <p>第2堂出席人數: <span id="totalPresent2">0</span></p>
            </div>

            <!-- Result Section -->
            <div id="resultSection">
                <h3>統計結果</h3>
                <p>執行日期時間: <span id="attendanceDate"></span> <span id="attendanceTime"></span></p>
                <p>紀錄日期: <span id="attendanceClass"></span></p>
                <p>全部紀錄人數: <span id="attendanceTotalStudents"></span></p>
                <p>總出席人數（1+2堂）: <span id="attendancePresent"></span></p>
                <p>缺席人數: <span id="attendanceAbsent"></span></p>
                <p>第1堂出席率: <span id="attendanceRate1"></span></p>
                <p>第2堂出席率: <span id="attendanceRate2"></span></p>
                <p>總出席率: <span id="attendanceRate"></span></p>
                <button onclick="histRate()">統計圖</button>
            </div>
        </div>

        <!-- Historical Chart -->
        <div id="hisSection">
            <h3>出席率統計圖</h3>
            <p><span id="attP"></span></p>
            <canvas id="myChart"></canvas>
        </div>

        <!-- Local Storage Buttons -->
        <div>
            <button id="exlocal" onclick="exportLocalStorage()">暫存紀錄</button>
            <button id="inlocal" onclick="showReadForm()">讀回暫存紀錄</button>
        </div>

    </div>

    <!-- Hidden Google File ID -->
    <p id="pfileId">1Hpp1mb0gL_5kUUR09j6v7HVLXfyK90Sw</p>

    <!-- Main JS -->
    <script src="scripts/roster2.js"></script>

</body>
</html>
